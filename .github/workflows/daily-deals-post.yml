name: Daily Instagram Deals Post
on:
  workflow_dispatch:
    inputs:
      max_deals:
        description: "Number of deals to generate (1-10)"
        required: false
        default: "5"
      post_type:
        description: "Post type: single | top5 | budget | category:Tech"
        required: false
        default: "single"
      dry_run:
        description: "Dry run — generate images/reel but skip all social posting"
        required: false
        default: "false"
        type: boolean
      skip_reel:
        description: "Skip reel TryPost only (still posts to OzBargain)"
        required: false
        default: "false"
        type: boolean
permissions:
  contents: read

jobs:
  generate-posts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline/camel-to-instagram
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: pipeline/camel-to-instagram/package.json
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --fix-missing ffmpeg google-chrome-stable
      - name: Install dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm install
      - name: Download background music
        continue-on-error: true
        env:
          BGMUSIC_URL: ${{ secrets.BGMUSIC_URL }}
        run: |
          if [ -n "$BGMUSIC_URL" ]; then
            curl -fsSL "$BGMUSIC_URL" -o templates/bg-music.mp3 && echo "Background music downloaded" || echo "Music download failed — reel will be silent"
          else
            echo "BGMUSIC_URL not set — reel will be silent"
          fi
      - name: Generate static deal post + reel
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
          POST_TO_INSTAGRAM: "false"
          POST_TO_BUFFER: "false"
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG || 'dealdrop0d5-22' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          MAX_DEALS: ${{ github.event.inputs.max_deals || '1' }}
          POST_TYPE: ${{ github.event.inputs.post_type || 'single' }}
          OUTPUT_DIR: ./output
        run: npm run generate
      - name: Generate Reel
        continue-on-error: true
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG || 'dealdrop0d5-22' }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
          TRYPOST_API_TOKEN: ${{ secrets.TRYPOST_API_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          SKIP_REEL: ${{ github.event.inputs.skip_reel || 'false' }}
        run: npm run generate:reel
      - name: Upload deal posts as artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: instagram-deals-${{ github.run_number }}
          path: pipeline/camel-to-instagram/output/
          retention-days: 30
          if-no-files-found: warn

  post-ozbargain:
    runs-on: [self-hosted, ozbargain-mac]
    needs: generate-posts
    if: ${{ github.event.inputs.dry_run != 'true' }}
    defaults:
      run:
        working-directory: /Users/rohit.ai/projects/deals-website/pipeline/camel-to-instagram
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm install
      - name: Post to OzBargain
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG || 'dealdrop0d5-22' }}
          OZBARGAIN_COOKIES: ${{ secrets.OZBARGAIN_COOKIES }}
          PUPPETEER_EXECUTABLE_PATH: /Applications/Google Chrome.app/Contents/MacOS/Google Chrome
        run: npx ts-node post-ozbargain-local.ts
