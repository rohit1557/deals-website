<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #fff;
    position: relative;
    overflow: hidden;
  }

  /* Background image layer — blurred when a product photo is injected */
  #bg {
    position: absolute;
    inset: -30px;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    background-size: cover;
    background-position: center;
  }
  #bg.blurred {
    filter: blur(28px);
  }

  /* Dark overlay for readability */
  #overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      135deg,
      rgba(0,0,0,0.65) 0%,
      rgba(0,0,0,0.72) 50%,
      rgba(0,0,0,0.82) 100%
    );
  }

  /* All content sits above overlay */
  #frame {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 48px 60px;
  }

  /* Brand bar */
  .brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0;
  }
  .brand-name {
    font-size: 30px;
    font-weight: 900;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, #818cf8, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .brand-site {
    font-size: 17px;
    color: rgba(255,255,255,0.5);
    font-weight: 500;
  }

  /* ── Two-column body ── */
  .content {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 44px;
    padding: 24px 0;
  }

  /* Text column — left-aligned when product col is visible */
  .text-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 22px;
  }

  /* Centered fallback when there's no product image */
  .content.no-product .text-col {
    align-items: center;
    text-align: center;
    max-width: 100%;
  }
  .content.no-product .deal-title {
    max-width: 880px;
    font-size: 48px;
  }
  .content.no-product .deal-price {
    font-size: 96px;
    letter-spacing: -4px;
  }
  .content.no-product .drop-badge {
    font-size: 52px;
    padding: 14px 32px;
  }
  .content.no-product .cta {
    max-width: 880px;
  }

  /* Product image column */
  .product-col {
    width: 420px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Spotlight glow behind product */
  .product-col {
    position: relative;
  }
  .product-col::before {
    content: '';
    position: absolute;
    width: 480px;
    height: 480px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .product-frame {
    width: 400px;
    height: 400px;
    border-radius: 28px;
    overflow: hidden;
    /* White frame so mix-blend-mode:multiply on the img makes the product's
       white background disappear and only the product itself is visible */
    background: #fff;
    box-shadow:
      0 30px 100px rgba(0,0,0,0.65),
      0 0 0 1px rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Radial vignette fades edges into the dark background */
  .product-frame::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
    border-radius: 28px;
  }

  #product-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 16px;
    /* multiply makes white pixels transparent against the white frame,
       so only the actual product renders visibly */
    mix-blend-mode: multiply;
  }

  /* ── Text elements ── */
  .rank-badge {
    background: linear-gradient(90deg, #f59e0b, #ef4444);
    color: #fff;
    font-size: 18px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    padding: 9px 26px;
    border-radius: 100px;
    box-shadow: 0 4px 20px rgba(239,68,68,0.4);
    white-space: nowrap;
  }

  .deal-title {
    font-size: 40px;
    font-weight: 800;
    line-height: 1.18;
    max-width: 560px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.6);
  }

  .price-row {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .deal-price {
    font-size: 80px;
    font-weight: 900;
    letter-spacing: -3px;
    color: #4ade80;
    text-shadow: 0 0 40px rgba(74,222,128,0.35);
    line-height: 1;
  }

  .price-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }

  .was-price {
    font-size: 24px;
    color: rgba(255,255,255,0.4);
    text-decoration: line-through;
    font-weight: 600;
  }

  .drop-badge {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: #fff;
    font-size: 38px;
    font-weight: 900;
    padding: 10px 24px;
    border-radius: 14px;
    box-shadow: 0 6px 28px rgba(239,68,68,0.55);
    letter-spacing: -0.5px;
  }

  .cta {
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    padding: 14px 28px;
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(99,102,241,0.5);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 560px;
  }

  /* Footer */
  .footer {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    color: rgba(255,255,255,0.3);
    font-weight: 500;
    gap: 8px;
  }
</style>
</head>
<body>
  <div id="bg"></div>
  <div id="overlay"></div>

  <div id="frame">
    <div class="brand">
      <span class="brand-name">DealDrop</span>
      <span class="brand-site">dealdrop.au</span>
    </div>

    <div class="content no-product" id="content">

      <!-- Text column -->
      <div class="text-col">
        <div class="rank-badge" id="rank-badge">Deal of the Day</div>
        <div class="deal-title" id="deal-title">Loading...</div>
        <div class="price-row">
          <div class="deal-price" id="deal-price">$0</div>
          <div class="price-meta">
            <div class="was-price" id="was-price" style="display:none"></div>
            <div class="drop-badge" id="drop-badge" style="display:none"></div>
          </div>
        </div>
        <div class="cta" id="cta-url">amazon.com.au</div>
      </div>

      <!-- Product image column — hidden until injected -->
      <div class="product-col" id="product-col" style="display:none">
        <div class="product-frame">
          <img id="product-image" src="" alt="Product" />
        </div>
      </div>

    </div>

    <div class="footer">
      Price drop data by CamelCamelCamel &nbsp;•&nbsp; Amazon Australia
    </div>
  </div>
</body>
</html>
