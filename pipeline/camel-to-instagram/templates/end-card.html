<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1920px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #fff; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  #bg { position: absolute; inset: 0; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); }
  #overlay { position: absolute; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(192,132,252,0.15) 0%, transparent 70%); }
  .content { position: relative; display: flex; flex-direction: column; align-items: center; gap: 36px; text-align: center; }
  .logo { font-size: 56px; font-weight: 900; letter-spacing: -1px; background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .cta { font-size: 64px; font-weight: 800; line-height: 1.2; text-shadow: 0 4px 40px rgba(0,0,0,0.6); }
  .domain { font-size: 80px; font-weight: 900; color: #4ade80; text-shadow: 0 0 60px rgba(74,222,128,0.45); letter-spacing: -1px; }
  .arrow { font-size: 100px; -webkit-text-fill-color: initial; }
</style>
</head>
<body>
  <div id="bg"></div>
  <div id="overlay"></div>
  <div class="content">
    <div class="logo">DealDrop</div>
    <div class="cta">More deals at</div>
    <div class="domain">dealdrop.au</div>
    <div class="arrow">👇</div>
  </div>
</body>
</html>
