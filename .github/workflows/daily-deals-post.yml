name: Daily Instagram Deals Post
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      max_deals:
        description: "Number of deals to generate (1-10)"
        required: false
        default: "5"
      post_type:
        description: "Post type: single | top5 | budget | category:Tech"
        required: false
        default: "single"
jobs:
  generate-posts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline/camel-to-instagram
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pipeline/camel-to-instagram/package.json
      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg
      - name: Install dependencies
        run: npm install
      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome
      - name: Generate static deal post
        env:
          POST_TO_INSTAGRAM: "false"
          POST_TO_BUFFER: "false"
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG || 'dealdrop0d5-22' }}
          MAX_DEALS: ${{ github.event.inputs.max_deals || '1' }}
          POST_TYPE: ${{ github.event.inputs.post_type || 'single' }}
          OUTPUT_DIR: ./output
        run: npm run generate
      - name: Generate Reel
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG || 'dealdrop0d5-22' }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: npm run generate:reel
      - name: Upload deal posts as artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: instagram-deals-${{ github.run_number }}
          path: pipeline/camel-to-instagram/output/
          retention-days: 30
          if-no-files-found: warn
