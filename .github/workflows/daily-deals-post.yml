name: Daily Instagram Deals Post
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      max_deals:
        description: "Number of deals to generate (1-10)"
        required: false
        default: "5"
jobs:
  generate-posts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline/camel-to-instagram
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pipeline/camel-to-instagram/package.json
      - name: Install dependencies
        run: npm install
      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome
      - name: Generate deal images and captions
        env:
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG || 'dealdrop0d5-22' }}
          MAX_DEALS: ${{ github.event.inputs.max_deals || '5' }}
          OUTPUT_DIR: ./output
        run: npm run generate
      - name: Upload deal posts
        uses: actions/upload-artifact@v4
        with:
          name: instagram-deals-${{ github.run_number }}
          path: pipeline/camel-to-instagram/output/
          retention-days: 7
          if-no-files-found: error
